<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amina Hidjabista — Accueil</title>
<meta name="theme-color" content="#0F3D3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">Amina <span>Hidjabista</span></div>
  <button class="burger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
  <nav id="nav"></nav>
</header>

<div class="stitch"></div>

<section class="hero">
  <div class="eyebrow" id="hero-eyebrow"></div>
  <h1 id="hero-titre"></h1>
  <p id="hero-description"></p>
</section>

<section class="section">
  <h2>Parcourir la boutique</h2>
  <p class="lead" id="sous-titre-boutique"></p>
  <div class="grid" id="categories-accueil"></div>
</section>

<footer>
  <div>© 2026 Amina Hidjabista · Site par Mouhammad</div>
  <div>Paiement via <a href="wave.html">Wave</a> · 77 376 99 51</div>
</footer>

<script src="script.js"></script>
<script>
(async () => {
  await renderNav("accueil");
  await renderCategoriesAccueil("categories-accueil");

  const contenu = await getContenu();
  document.getElementById("hero-eyebrow").textContent = contenu.eyebrow || "Bienvenue chez Amina";
  document.getElementById("hero-titre").textContent = contenu.titre || "La boutique d'Amina, l'hidjabista.";
  document.getElementById("hero-description").textContent = contenu.description || "";
  document.getElementById("sous-titre-boutique").textContent = contenu.sous_titre_boutique || "";
})();
</script>
</body>
</html>
