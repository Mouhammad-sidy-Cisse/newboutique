<script src="script.js"></script>
<script>
function tenterConnexion() {
  const pass = document.getElementById("pass").value;
  if (connecterAdmin(pass)) {
    afficherAdmin();
  } else {
    document.getElementById("erreur").textContent = "Mot de passe incorrect.";
  }
}

function seDeconnecter() {
  deconnecterAdmin();
  document.getElementById("zone-admin").style.display = "none";
  document.getElementById("zone-login").style.display = "block";
  document.getElementById("pass").value = "";
}

function afficherAdmin() {
  document.getElementById("zone-login").style.display = "none";
  document.getElementById("zone-admin").style.display = "block";
  renderNav("admin");
  renderSelectCategories();
  renderListeCategories();
  renderListeAdmin();
}

function onAjouterCategorie() {
  const champ = document.getElementById("nouvelle-categorie");
  const res = ajouterCategorie(champ.value);
  const msg = document.getElementById("cat-msg");
  if (res.ok) {
    msg.style.color = "var(--teal)";
    msg.textContent = "Catégorie ajoutée.";
    champ.value = "";
    renderNav("admin");
    renderSelectCategories();
    renderListeCategories();
  } else {
    msg.style.color = "#a83232";
    msg.textContent = res.message;
  }
}

function onSupprimerCategorie(slug) {
  if (!confirm("Supprimer cette catégorie ?")) return;
  supprimerCategorie(slug);
  renderNav("admin");
  renderSelectCategories();
  renderListeCategories();
}

function renderListeCategories() {
  const el = document.getElementById("liste-categories");
  const cats = getCategories();
  if (cats.length === 0) {
    el.innerHTML = `<div class="empty">Aucune catégorie. Ajoute-en une ci-dessus.</div>`;
    return;
  }
  el.innerHTML = cats.map(c => `
    <div class="admin-row">
      <div class="info"><span class="tag">${c.slug}</span><strong>${c.label}</strong></div>
      <button class="btn danger small" onclick="onSupprimerCategorie('${c.slug}')">Supprimer</button>
    </div>
  `).join("");
}

function renderSelectCategories() {
  const sel = document.getElementById("categorie");
  const cats = getCategories();
  sel.innerHTML = cats.map(c => `<option value="${c.slug}">${c.label}</option>`).join("");
}

document.getElementById("image").addEventListener("change", function (e) {
  const file = e.target.files[0];
  const apercu = document.getElementById("apercu");
  if (!file) { apercu.style.display = "none"; return; }
  const reader = new FileReader();
  reader.onload = function (ev) {
    apercu.src = ev.target.result;
    apercu.style.display = "block";
  };
  reader.readAsDataURL(file);
});

async function ajouterArticle() {
  const nom = document.getElementById("nom").value.trim();
  const montant = document.getElementById("montant").value.trim();
  const localisation = document.getElementById("localisation").value.trim();
  const categorie = document.getElementById("categorie").value;
  const fichierImage = document.getElementById("image").files[0];
  const description = document.getElementById("description").value.trim();
  const confirmEl = document.getElementById("confirmation");
  const btn = document.getElementById("btn-ajouter");

  if (!categorie) {
    confirmEl.style.color = "#a83232";
    confirmEl.textContent = "Ajoute d'abord au moins une catégorie.";
    return;
  }
  if (!nom || !montant || !localisation) {
    confirmEl.style.color = "#a83232";
    confirmEl.textContent = "Merci de remplir le nom, le montant et la localisation.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Envoi en cours…";
  confirmEl.textContent = "";

  try {
    const formData = new FormData();
    formData.append("categorie", categorie);
    formData.append("nom", nom);
    formData.append("montant", montant);
    formData.append("localisation", localisation);
    formData.append("description", description);
    if (fichierImage) formData.append("image", fichierImage);

    const res = await fetch("/articles", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Erreur serveur : " + res.status);

    document.getElementById("nom").value = "";
    document.getElementById("montant").value = "";
    document.getElementById("localisation").value = "";
    document.getElementById("image").value = "";
    document.getElementById("apercu").style.display = "none";
    document.getElementById("description").value = "";

    confirmEl.style.color = "var(--teal)";
    confirmEl.textContent = "Article ajouté avec succès !";
    renderListeAdmin();
  } catch (err) {
    confirmEl.style.color = "#a83232";
    confirmEl.textContent = "Erreur : " + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "Ajouter l'article";
  }
}

async function supprimerArticle(id) {
  if (!confirm("Supprimer cet article ?")) return;
  try {
    await fetch(`/articles/${id}`, { method: "DELETE" });
    renderListeAdmin();
  } catch (err) {
    alert("Erreur lors de la suppression.");
  }
}

async function renderListeAdmin() {
  const el = document.getElementById("liste-admin");
  el.innerHTML = `<div class="empty">Chargement…</div>`;
  try {
    const res = await fetch("/articles");
    const liste = await res.json();
    if (liste.length === 0) {
      el.innerHTML = `<div class="empty">Aucun article ajouté pour le moment.</div>`;
      return;
    }
    el.innerHTML = liste.map(p => `
      <div class="admin-row">
        <div class="info">
          <img src="${p.image_url || 'https://placehold.co/100x100/F2E8D5/0F3D3E?text=' + encodeURIComponent(p.nom[0] || '?')}" alt="">
          <div>
            <span class="tag">${p.categorie}</span><br>
            <strong>${p.nom}</strong> — ${p.montant} FCFA<br>
            <small>${p.localisation}</small>
          </div>
        </div>
        <button class="btn danger small" onclick="supprimerArticle(${p.id})">Supprimer</button>
      </div>
    `).join("");
  } catch (err) {
    el.innerHTML = `<div class="empty">Erreur de chargement.</div>`;
  }
}

if (isAdminConnecte()) { afficherAdmin(); } else { renderNav("admin"); }
</script>
